<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlists | Music Diary</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/playlists.css">
</head>
<body>
  <header class="app-header">
  <nav class="nav">
    <a class="logo" href="feed.html">Music Diary</a>
    <div class="nav-links">
      <a href="feed.html">Feed</a>
      <a href="profile.html">Perfil</a>
      <a href="playlists.html">Playlists</a>
      <a href="explore.html">Explorar</a>
      <a href="social.html">Seguidores</a>
      <a href="notifications.html">Notificações</a>
      <a href="chat.html">Mensagens</a>
      <button id="logoutBtn">Sair</button>
    </div>
  </nav>
</header>

  <main class="page playlist-page">
    <section class="card">
      <h2 class="window-title">Minhas playlists</h2>
      <p class="muted">Crie playlists, adicione músicas e compartilhe seu gosto musical.</p>
    </section>

    <section class="playlist-grid" style="margin-top:20px;">
      <form id="playlistForm" class="card">
        <h2 class="window-title">Criar playlist</h2>

        <label>Nome da playlist</label>
        <input name="title" placeholder="Exemplo: madrugada">

        <label>Descrição</label>
        <textarea name="description" placeholder="Qual é a vibe dessa playlist?"></textarea>

        <label>Link da capa</label>
        <input name="cover" placeholder="Cole um link de imagem">

        <button type="submit">Criar playlist</button>
      </form>

      <form id="songForm" class="card">
        <h2 class="window-title">Adicionar música</h2>

        <label>Playlist</label>
        <select id="playlistSelect" name="playlist">
          <option value="">Escolha uma playlist</option>
        </select>

        <label>Título da música</label>
        <input name="musicTitle" placeholder="Exemplo: 505">

        <label>Artista</label>
        <input name="musicArtist" placeholder="Exemplo: Arctic Monkeys">

        <label>Link da música</label>
        <input name="musicUrl" placeholder="YouTube, Spotify ou MP3">

        <button type="submit">Adicionar música</button>
      </form>
    </section>

    <section id="playlistsList" style="margin-top:22px;"></section>
  </main>

  <script type="module" src="js/presence.js"></script>
  <script type="module" src="js/playlists.js"></script>
</body>
</html>
