<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed | Music Diary</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/feed.css">
</head>
<body>
  <header class="app-header">
  <nav class="nav">
    <a class="logo" href="feed.html">Music Diary</a>
    <div class="nav-links">
      <a href="feed.html">Feed</a>
      <a href="profile.html">Perfil</a>
      <a href="playlists.html">Playlists</a>
      <a href="explore.html">Explorar</a>
      <a href="social.html">Seguidores</a>
      <a href="notifications.html">Notificações</a>
      <a href="chat.html">Mensagens</a>
      <button id="logoutBtn">Sair</button>
    </div>
  </nav>
</header>

  <main class="page grid">
    <aside>
      <section class="card mini-profile" id="miniProfile">Carregando perfil...</section>
      <section class="card side-menu" style="margin-top:20px;">
        <h2 class="window-title">Menu</h2>
        <a class="soft-link" href="feed.html">🏠 Feed</a>
        <a class="soft-link" href="profile.html">👤 Perfil</a>
        <a class="soft-link" href="explore.html">🔍 Explorar</a>
        <a class="soft-link" href="chat.html">💬 Chat</a>
      </section>
    </aside>

    <section>
      <form class="card composer" id="postForm">
        <h2 class="window-title">Criar post</h2>
        <textarea name="text" placeholder="O que você quer postar hoje?"></textarea>
        <input name="music" placeholder="Link de música, YouTube ou Spotify">
        <input name="image" placeholder="Link de imagem/foto">
        <button type="submit">Postar</button>
      </form>

      <div id="feed" style="margin-top:20px;"></div>
    </section>

    <aside class="card right-widget">
      <h2 class="window-title">Music Diary v0.7</h2>
      <p>🎵 Agora cada perfil pode ter uma música fixa.</p>
      <hr>
      <p>Funciona com:</p>
      <p>YouTube, Spotify e links MP3.</p>
    </aside>
  </main>

  <script type="module" src="js/feed.js"></script>
  <script type="module" src="js/presence.js"></script>
</body>
</html>
