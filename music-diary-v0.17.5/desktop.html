<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <link rel="icon" sizes="192x192" href="images/favicon.png">
  <link rel="icon" sizes="512x512" href="images/favicon.png">
<title>Desktop | Music Diary</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/desktop.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/astra@latest/dist/astra.min.css">
</head>
<body class="desktop-body">
  <header class="app-header">
    <nav class="nav" aria-label="Navegação principal">
      <a class="logo" href="feed.html">Music Diary</a>
      <div class="nav-actions">
        <button class="nav-icon-btn" type="button" aria-label="Mensagens" title="Mensagens" data-alert-type="messages" data-nav-href="chat.html">
          <span class="nav-icon" aria-hidden="true">💬</span>
          <span class="nav-alert nav-alert-message" hidden></span>
          <span class="nav-count" data-count-for="messages" hidden></span>
        </button>
        <button class="nav-icon-btn" type="button" aria-label="Notificações" title="Notificações" data-alert-type="notifications" data-nav-href="notifications.html">
          <span class="nav-icon" aria-hidden="true">🔔</span>
          <span class="nav-alert nav-alert-notification" hidden></span>
          <span class="nav-count" data-count-for="notifications" hidden></span>
        </button>
        <div class="nav-menu-wrap">
          <button class="nav-icon-btn" type="button" aria-label="Perfil" title="Perfil" aria-expanded="false" data-nav-toggle="profileMenu">
            <span class="nav-icon" aria-hidden="true">👤</span>
          </button>
          <div class="nav-dropdown" id="profileMenu" data-nav-menu hidden>
            <a href="profile.html">Meu perfil</a>
            <a href="profile.html#editar">Editar perfil</a>
            <a href="feed.html#favoritos">Favoritos</a>
            <a href="profile.html#configuracoes">Configurações</a>
            <button id="logoutBtn" type="button">Sair</button>
          </div>
        </div>
        <div class="nav-menu-wrap">
          <button class="nav-icon-btn" type="button" aria-label="Menu" title="Menu" aria-expanded="false" data-nav-toggle="mainMenu">
            <span class="nav-icon" aria-hidden="true">☰</span>
          </button>
          <div class="nav-dropdown" id="mainMenu" data-nav-menu hidden>
            <a href="desktop.html">Desktop</a>
            <a href="feed.html">Feed</a>
            <a href="playlists.html">Playlists</a>
            <a href="explore.html">Explorar</a>
            <a href="social.html">Seguidores</a>
            <a href="profile.html#temas">Temas</a>
            <a href="feed.html#salvos">Salvos</a>
            <a href="index.html">Ajuda</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="desktop-shell">
    <section id="desktopArea" class="desktop-area">
      <div class="desktop-icons">
        <button class="desktop-icon" data-app="profile">
          <span class="icon-img">👤</span>
          <span class="icon-label">Meu Perfil</span>
        </button>

        <button class="desktop-icon" data-app="winamp">
          <span class="icon-img">🎵</span>
          <span class="icon-label">Winamp</span>
        </button>

        <button class="desktop-icon" data-app="playlists">
          <span class="icon-img">💿</span>
          <span class="icon-label">Playlists</span>
        </button>

        <button class="desktop-icon" data-app="chat">
          <span class="icon-img">💬</span>
          <span class="icon-label">Mensagens</span>
        </button>

        <button class="desktop-icon" data-app="feed">
          <span class="icon-img">📝</span>
          <span class="icon-label">Feed</span>
        </button>

        <button class="desktop-icon" data-app="settings">
          <span class="icon-img">⚙️</span>
          <span class="icon-label">Config</span>
        </button>
      </div>
    </section>

    <footer class="taskbar">
      <button class="start-btn">💿 Iniciar</button>
      <div id="taskbarApps" class="taskbar-apps"></div>
      <div class="tray">🔊 <span id="clock">--:--</span></div>
    </footer>
  </main>

  <script type="module" src="js/presence.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/desktop.js"></script>
  <script type="module" src="js/navigation.js"></script>
  <script type="module" src="js/notifier.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/astra@latest/dist/astra.min.js"></script>
</body>
</html>
