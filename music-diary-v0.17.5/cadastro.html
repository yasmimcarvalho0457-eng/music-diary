<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">
  <link rel="icon" sizes="192x192" href="images/favicon.png">
  <link rel="icon" sizes="512x512" href="images/favicon.png">
<title>Criar conta | Music Diary</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/astra@latest/dist/astra.min.css">
</head>
<body>
  <main class="auth-box">
    <section class="card">
      <h1 class="logo">Music Diary</h1>
      <h2 class="window-title">Criar conta</h2>

      <form id="signupForm">
        <label>Nome de usuário</label>
        <input name="username" placeholder="exemplo: yasmim" required>

        <label>E-mail</label>
        <input name="email" type="email" placeholder="seuemail@email.com" required>

        <label>Senha</label>
        <input name="password" type="password" placeholder="mínimo 6 caracteres" required>

        <button type="submit">Criar conta</button>
        <a class="soft-link" href="login.html">Já tenho conta</a>
      </form>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
  <script type="module">import { applySavedTheme } from "./js/theme.js"; applySavedTheme();</script>
  <script src="https://cdn.jsdelivr.net/npm/astra@latest/dist/astra.min.js"></script>
</body>
</html>
